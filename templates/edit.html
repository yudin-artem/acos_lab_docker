<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Редактировать контакт</title>
</head>
<body style="background-color: #f0f0f0; padding: 20px;">
<body>
    <h1>Редактировать контакт</h1>
    
    <form action="/update/{{ contact[0] }}" method="POST">
        <input type="hidden" name="id" value="{{ contact[0] }}">
        
        <p>
            <label>Имя:</label><br>
            <input type="text" name="name" value="" required>
        </p>
        <p>
            <label>Фамилия:</label><br>
            <input type="text" name="surname" value="" required>
        </p>
        <p>
            <label>Телефон:</label><br>
            <input type="text" name="phone" value="" required>
        </p>
        <p>
            <label>Заметка:</label><br>
            <textarea name="note" rows="3" cols="30"></textarea>
        </p>
        <p>
            <button type="submit">Сохранить</button>
            <a href="/">Отмена</a>
        </p>
    </form>
    <a href="/">Вернуться к списку</a>
 
</body>
</html>
