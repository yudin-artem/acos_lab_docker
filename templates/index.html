<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Телефонная книга</title>
</head>
<body style="background-color: #f0f0f0; padding: 20px;">
<body>
    <h1>Телефонная книга</h1>
    
    <!-- Форма добавления -->
    <h2>Добавить контакт</h2>
    <form action="/add" method="POST">
        <p>
            <label>Имя:</label><br>
            <input type="text" name="name" required>
        </p>
        <p>
            <label>Фамилия:</label><br>
            <input type="text" name="surname" required>
        </p>
        <p>
            <label>Телефон:</label><br>
            <input type="text" name="phone" required>
        </p>
        <p>
            <label>Заметка:</label><br>
            <textarea name="note" rows="3" cols="30"></textarea>
        </p>
        <button type="submit">Сохранить</button>
    </form>
    
    <hr>
    
    <!-- Список контактов -->
    <h2>Список контактов</h2>
    
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Фамилия</th>
                <th>Телефон</th>
                <th>Заметка</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td>
                    <a href="/edit/{{ contact[0] }}">[Редактировать]</a>
                    <a href="/delete/{{ contact[0] }}" onclick="return confirm('Удалить?')">[Удалить]</a>
                </td>
            </tr>
            
        </tbody>
    </table>
    
</body>
</html>
